<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Barbearia DH Gentlemen</title>

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/schedule.css">
</head>

<body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

    <header>
        <nav>
            <input type="checkbox" id="menu-toggle" aria-hidden="true">
            <label for="menu-toggle" class="hamburger" aria-label="Abrir menu de navegação">☰</label>
            <ul class="left">
                <li><a href="services.html">Serviços</a></li>
                <li><a href="about.html">Sobre nós</a></li>
            </ul>
            <a href="index.html" class="nav-logo">Início</a>
            <ul class="right">
                <li><a href="schedule.html" class="select">Agenda</a></li>
                <li><a href="location.html">Localização</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">

        <form action="success.html">

            <label for="nome">Seu nome:</label>
            <input type="text" id="nome" name="nome" required placeholder="Escreva seu nome aqui!">

            <label for="servico">Tipo de serviço:</label>
            <select id="servico" name="servico" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="masculino">Corte Masculino</option>
                <option value="barba">Corte + Barba</option>
                <option value="feminino">Corte Feminino</option>
            </select>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="13 12345-6789">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required placeholder="seu@email.com">

            <label for="data">Quando deseja agendar?</label>
            <input type="date" id="data" name="data" required>

            <label for="horario">Escolha o seu horário:</label>
            <select id="horario" name="horario" style="width: 120px;" required></select>

            <script>
                const selectHorario = document.getElementById('horario');
                for (let h = 10; h <= 19; h++) {
                    ['00', '30'].forEach(m => selectHorario.add(new Option(`${h}:${m}`, `${h}:${m}`)));
                }

                const inputTelefone = document.getElementById('telefone');
                inputTelefone.addEventListener('input', function (e) {
                    let valor = e.target.value.replace(/\D/g, ''); 
                    valor = valor.substring(0, 11);                  
                    let formatado = '';
                    if (valor.length > 0) {
                        formatado = '(' + valor;
                    }
                    if (valor.length > 2) {
                        formatado = '(' + valor.substring(0, 2) + ') ' + valor.substring(2);
                    }
                    if (valor.length > 7) {
                        formatado = '(' + valor.substring(0, 2) + ') ' + valor.substring(2, 7) + '-' + valor.substring(7);
                    }
                    e.target.value = formatado;
                });
            </script>

            <label for="observacao">Alguma observação? (Opcional)</label>
            <textarea id="observacao" name="observacao" rows="3" style="width: 100%" placeholder="Ex: Quero disfarçado, cortar só na tesoura, tenho alergia a gilete..."></textarea>

            <button type="submit" id="botao">AGENDAR</button>
        </form>
    </main>
</body>
