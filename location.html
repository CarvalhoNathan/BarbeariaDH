            border: 2px solid #F5FAFB;
            box-sizing: border-box;
            display: block;
        }

        aside {

        }

        aside {
            color: #F5FAFB;
            padding: 20px;
            background: rgba(8, 55, 11, 0.6);
            border-radius: 0 20px 20px 0;
            box-sizing: border-box;
        }

        aside address p {
            margin: 0.5rem 0;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }

            aside {
                border-radius: 0 0 20px 20px;
            }
